name: Build LaTeX Documents

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  check-changes:
    runs-on: ubuntu-latest
    outputs:
      slides-changed: ${{ steps.check.outputs.slides }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check what changed
        id: check
        run: |
          if git diff --name-only HEAD~1 HEAD | grep -qE '(Slides/|Common_Images/)'; then
            echo "slides=true" >> $GITHUB_OUTPUT
          else
            echo "slides=false" >> $GITHUB_OUTPUT
          fi
        continue-on-error: true

  build-slides:
    needs: check-changes
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'pull_request' ||
      needs.check-changes.outputs.slides-changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Collect slide sources
        id: slide-list
        working-directory: Slides
        run: |
          # List all root .tex files available in the Slides folder
          files=$(ls *.tex)
          echo "ROOT_FILES<<EOF" >> $GITHUB_ENV
          printf '%s\n' "$files" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Compile Slides
        uses: xu-cheng/latex-action@v3
        with:
          root_file: ${{ env.ROOT_FILES }}
          working_directory: Slides

      - name: Rename and prepare PDFs
        if: success()
        run: |
          for pdf in Slides/*.pdf; do
            if [ -f "$pdf" ]; then
              base=$(basename "$pdf" .pdf)
              cp "$pdf" "CCMI_2026_${base}.pdf"
            fi
          done

      - name: Upload Slides to Release
        if: success() && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
        uses: softprops/action-gh-release@v1
        with:
          files: CCMI_2026_*.pdf
          tag_name: latest
          generate_release_notes: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: compiled-pdfs-slides
          path: |
            Slides/*.pdf
            CCMI_2026_*.pdf
          retention-days: 30