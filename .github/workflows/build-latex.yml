name: Build LaTeX Documents

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'Slides/**'
      - 'Common_Images/**'
      - '.github/workflows/build-latex.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'Slides/**'
      - 'Common_Images/**'
      - '.github/workflows/build-latex.yml'

jobs:
  build-slides:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Collect slide sources
        id: slide-list
        working-directory: Slides
        run: |
          files=$(find . -maxdepth 1 -type f -name '*.tex' -printf '%f\n' | sort)

          if [ -z "$files" ]; then
            echo "No TeX files found in Slides/."
            exit 1
          fi

          {
            echo "ROOT_FILES<<EOF"
            printf '%s\n' "$files"
            echo "EOF"
          } >> "$GITHUB_ENV"

      - name: Compile slides
        uses: xu-cheng/latex-action@v3
        with:
          root_file: ${{ env.ROOT_FILES }}
          working_directory: Slides

      - name: Rename and prepare PDFs
        if: success()
        run: |
          for pdf in Slides/*.pdf; do
            if [ -f "$pdf" ]; then
              base=$(basename "$pdf" .pdf)
              cp "$pdf" "CCMI_2026_${base}.pdf"
            fi
          done

      - name: Upload slides to release
        if: success() && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
        uses: softprops/action-gh-release@v2
        with:
          files: CCMI_2026_*.pdf
          tag_name: latest
          generate_release_notes: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: compiled-pdfs-slides
          path: |
            Slides/*.pdf
            CCMI_2026_*.pdf
          retention-days: 30
